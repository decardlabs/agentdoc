# ============================================================
# Prometheus 配置 - 智能体工程师培养计划 项目 8
# 用途：配置 Prometheus 抓取指标和告警规则
# ============================================================

global:
  scrape_interval: 15s          # 抓取间隔
  evaluation_interval: 15s       # 规则评估间隔
  scrape_timeout: 10s            # 抓取超时

# ============ 告警管理器配置 ============
alerting:
  alertmanagers:
    - static_configs:
        - targets:
           - alertmanager:9093      # AlertManager 地址

# ============ 规则文件 ============
rule_files:
  - "alert_rules.yml"            # 告警规则
  - "recording_rules.yml"        # 记录规则

# ============ 抓取配置 ============
scrape_configs:
  # ---------- Agent 服务 ----------
  - job_name: "agent-service"
    scrape_interval: 5s            # 更频繁的抓取
    static_configs:
      - targets:
          - "agent:8001"   # Agent 服务的 metrics 端口（Docker 网络内使用服务名）
    metrics_path: /metrics
    scrape_timeout: 5s

  # ---------- Prometheus 自身 ----------
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  # ---------- AlertManager ----------
  - job_name: "alertmanager"
    static_configs:
      - targets:
          - "alertmanager:9093"

  # ---------- Grafana ----------
  - job_name: "grafana"
    static_configs:
      - targets:
          - "grafana:3000"

  # ---------- Node Exporter (可选) ----------
  # - job_name: "node"
  #   static_configs:
  #     - targets:
  #         - "node-exporter:9100"
