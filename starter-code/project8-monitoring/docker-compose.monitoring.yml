# ============================================================
# Docker Compose 监控栈编排 - 项目 8
# 用途：启动 Prometheus、Grafana、AlertManager 等监控服务
# ============================================================

version: "3.8"

services:
  # ============ Prometheus ============
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: agent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - monitoring-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ============ Grafana ============
  grafana:
    image: grafana/grafana:10.3.0
    container_name: agent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    depends_on:
      - prometheus
    networks:
      - monitoring-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ============ AlertManager ============
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: agent-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - monitoring-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ============ Node Exporter (可选) ============
  # node-exporter:
  #   image: prom/node-exporter:v1.7.0
  #   container_name: agent-node-exporter
  #   restart: unless-stopped
  #   ports:
  #     - "9100:9100"
  #   volumes:
  #     - /proc:/host/proc:ro
  #     - /sys:/host/sys:ro
  #     - /:/rootfs:ro
  #   command:
  #     - '--path.procfs=/host/proc'
  #     - '--path.sysfs=/host/sys'
  #     - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
  #   networks:
  #     - monitoring-network

  # ============ Webhook Adapter (钉钉/飞书) ============
  webhook-adapter:
    image: timonwong/prometheus-webhook-dingtalk:v2.1.0
    container_name: agent-webhook-adapter
    restart: unless-stopped
    ports:
      - "8060:80"
    networks:
      - monitoring-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring-network:
    driver: bridge
