# ============ Prometheus 数据源 ============
apiVersion: 1

datasources:
  # ---------- Prometheus ----------
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 5s
      queryTimeout: 60s
      httpMethod: POST
    version: 1

  # ---------- Loki (可选，用于日志) ----------
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   url: http://loki:3100
